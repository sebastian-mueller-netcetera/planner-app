<mat-sidenav-container class="shell-container">
  <!-- Sidenav -->
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="isMobile() ? sidenavOpened() : true"
    (closed)="closeSidenav()"
    class="shell-sidenav"
  >
    <div class="sidenav-header">
      <mat-icon class="brand-icon">event_note</mat-icon>
      <span class="brand-name">Planner</span>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-link"
          (click)="closeSidenav()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <button mat-button (click)="logout()" class="logout-btn">
        <mat-icon>logout</mat-icon>
        <span>Log out</span>
      </button>
    </div>
  </mat-sidenav>

  <!-- Main content -->
  <mat-sidenav-content class="shell-content">
    <!-- Toolbar -->
    <mat-toolbar class="shell-toolbar">
      @if (isMobile()) {
        <button mat-icon-button (click)="toggleSidenav()" aria-label="Toggle menu">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-title">Planner</span>
    </mat-toolbar>

    <!-- Page content -->
    <main class="main-content">
      <router-outlet />
    </main>

    <!-- Bottom navigation (mobile only) -->
    @if (isMobile()) {
      <nav class="bottom-nav">
        @for (item of navItems; track item.path) {
          <a
            class="bottom-nav-item"
            [routerLink]="item.path"
            routerLinkActive="bottom-nav-active"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span class="bottom-nav-label">{{ item.label }}</span>
          </a>
        }
      </nav>
    }
  </mat-sidenav-content>
</mat-sidenav-container>
