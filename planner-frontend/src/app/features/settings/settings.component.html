<div class="page-container">
  <header class="settings-header">
    <h1 class="page-title">Settings</h1>
  </header>

  <div class="settings-sections">
    <!-- Google Calendar -->
    <mat-card class="settings-card">
      <mat-card-content>
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-icon-wrapper">
              <mat-icon>calendar_month</mat-icon>
            </div>
            <div>
              <h3 class="setting-title">Google Calendar</h3>
              <p class="setting-description">
                Sync task deadlines with your Google Calendar.
              </p>
              <p class="setting-hint">Coming soon — Google OAuth not yet configured</p>
            </div>
          </div>
          <div class="setting-action">
            <button mat-flat-button disabled>
              <mat-icon>link</mat-icon>
              Connect
            </button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Account -->
    <mat-card class="settings-card">
      <mat-card-content>
        <div class="setting-row">
          <div class="setting-info">
            <div class="setting-icon-wrapper setting-icon-danger">
              <mat-icon>logout</mat-icon>
            </div>
            <div>
              <h3 class="setting-title">Sign out</h3>
              <p class="setting-description">Sign out of your account on this device.</p>
            </div>
          </div>
          <div class="setting-action">
            <button mat-stroked-button color="warn" (click)="logout()">
              Log out
            </button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
