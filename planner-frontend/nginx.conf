server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # NOTE: This proxy_pass block is for local docker-compose testing ONLY.
    # Remove it (or comment it out) when deploying to Coolify — in production
    # the frontend talks to the backend via its public domain.
    location /api/ {
        proxy_pass         http://planner-backend:8080/api/;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
