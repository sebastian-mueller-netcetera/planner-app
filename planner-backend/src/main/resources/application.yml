spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/planner}
    username: ${SPRING_DATASOURCE_USERNAME:planner}
    password: ${SPRING_DATASOURCE_PASSWORD:planner}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}
    access-token-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:placeholder}
    client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/integrations/google-calendar/callback}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
    # Generate with: openssl rand -base64 32
    # Must be a 32-byte (256-bit) base64-encoded key
    encryption-key-base64: ${GOOGLE_TOKEN_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
